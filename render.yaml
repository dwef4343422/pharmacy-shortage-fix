services:
  # Backend API (Python/FastAPI)
  - type: web
    name: pharmacy-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db          # Must match the PostgreSQL database name created in Render Dashboard
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # Update this in Render Dashboard after Vercel deployment
        # Format: https://your-app.vercel.app,https://your-preview.vercel.app
        value: "http://localhost:3000,http://127.0.0.1:3000"
      - key: OCR_ENGINE
        value: tesseract
      - key: OCR_CONFIDENCE_THRESHOLD
        value: "0.6"
      - key: UPLOAD_MAX_SIZE_MB
        value: "10"
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend (Next.js) - Optional: deploy to Vercel instead
  - type: web
    name: pharmacy-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pharmacy-backend.onrender.com/api/v1

# PostgreSQL Database: Create MANUALLY in Render Dashboard
# 1. Go to Render Dashboard → New → PostgreSQL
# 2. Name: pharmacy-db
# 3. Database: pharmacy_shortage
# 4. Region: oregon
# 5. Plan: Free
# 6. After creation, the backend will auto-connect via DATABASE_URL