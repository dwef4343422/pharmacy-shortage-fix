services:
  - type: web
    name: pharmacy-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # Update this in Render Dashboard after Vercel deployment with your Vercel URL
        # Format: https://your-app.vercel.app,https://your-preview.vercel.app
        value: "http://localhost:3000,http://127.0.0.1:3000"
      - key: OCR_ENGINE
        value: tesseract
      - key: OCR_CONFIDENCE_THRESHOLD
        value: "0.6"
      - key: UPLOAD_MAX_SIZE_MB
        value: "10"
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: PYTHON_VERSION
        value: "3.11"

  - type: postgresql
    name: pharmacy-db
    region: oregon
    plan: free
    databaseName: pharmacy_shortage
    ipAllowList: []

  - type: web
    name: pharmacy-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pharmacy-backend.onrender.com/api/v1