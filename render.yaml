services:
  # Backend API (Python/FastAPI) — deployed as a Docker service so we get a
  # pinned Python 3.11 image AND the Tesseract binary (Render's managed Python
  # runtime does not ship Tesseract). The app uses OCR_ENGINE=tesseract.
  - type: web
    name: pharmacy-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db          # Must match the PostgreSQL database name created in Render Dashboard
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # Update this in Render Dashboard after the Vercel frontend is live.
        # Format: https://your-app.vercel.app,https://your-preview.vercel.app
        value: "http://localhost:3000,http://127.0.0.1:3000"
      - key: OCR_ENGINE
        value: tesseract
      - key: OCR_CONFIDENCE_THRESHOLD
        value: "0.6"
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: UPLOAD_MAX_SIZE_MB
        value: "10"

# Frontend (Next.js) is deployed separately on Vercel — see frontend/vercel.json.
# PostgreSQL Database: Create MANUALLY in Render Dashboard
# 1. Go to Render Dashboard → New → PostgreSQL
# 2. Name: pharmacy-db
# 3. Database: pharmacy_shortage
# 4. Region: oregon
# 5. Plan: Free
# 6. After creation, the backend will auto-connect via DATABASE_URL
