services:
  - type: web
    name: pharmacy-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://pharmacy-frontend.onrender.com
      - key: OCR_ENGINE
        value: paddleocr
      - key: OCR_CONFIDENCE_THRESHOLD
        value: 0.6
      - key: UPLOAD_MAX_SIZE_MB
        value: 10

  - type: postgresql
    name: pharmacy-db
    region: oregon
    plan: free
    databaseName: pharmacy_shortage

  - type: web
    name: pharmacy-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pharmacy-backend.onrender.com/api/v1